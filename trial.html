<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>無料体験授業</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="header"></div>
  <header class="header">
    <h1>無料体験授業</h1>
    <p class="lead">
      合うかどうかは、受けてから決めてください。
    </p>
  </header>

  <main class="trial">

    <section class="trial-section">
      <h2>体験授業でやること</h2>
      <ul>
        <li>現在の理解度チェック（テストではありません）</li>
        <li>考え方のクセ・つまずきポイントの確認</li>
        <li>今後の学習計画のたたき作り</li>
      </ul>
    </section>

    <section class="trial-section">
      <h2>対象</h2>
      <p>
        中学1年生〜中学3年生<br>
        数学に苦手意識がある方も歓迎します。
      </p>
    </section>

    <section class="trial-section">
      <h2>時間・形式</h2>
      <p>
        時間：60分<br>
        形式：オンライン（Zoom）
      </p>
    </section>

    <section class="trial-section">
      <h2>持ち物</h2>
      <p>
        ・学校の教科書または市販教材<br>
        ・ノート、筆記用具
      </p>
      <p>
        ※ 教材はこちらから指定・販売することはありません。
      </p>
    </section>

    <section class="trial-section cta">
      <h2>体験授業は無料です</h2>
      <p>
        無理な勧誘は行いません。<br>
        安心してご参加ください。
      </p>

      <a class="button" href="#">
        無料体験授業を申し込む
      </a>
    </section>

  </main>

  <script src="header.js"></script>
  <script src="footer.js"></script>
  <div id="footer"></div>
</body>
</html>
